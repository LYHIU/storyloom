<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>封面设计原型</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #e8e4db; display: flex;
    gap: 40px; padding: 48px; align-items: flex-start;
    font-family: "PingFang SC","Microsoft YaHei",sans-serif;
    min-height: 100vh;
  }
  .column { display: flex; flex-direction: column; gap: 20px; align-items: center; }
  h3 { font-size: 13px; color: #5a5a5a; font-weight: 400; letter-spacing: 2px; margin-bottom: 4px; }

  /* Shared */
  .card { width: 180px; cursor: pointer; position: relative; transition: all 0.3s; }
  .card:hover { transform: translateY(-4px); }

  /* Macaron colors */
  .c-pink    { background: linear-gradient(145deg, #f2c9ca, #e8b0b2); }
  .c-mint    { background: linear-gradient(145deg, #c8e0d0, #aed4b8); }
  .c-blue    { background: linear-gradient(145deg, #c8daf0, #aec4e8); }
  .c-lavender{ background: linear-gradient(145deg, #d6cce8, #c4b8dc); }
  .c-peach   { background: linear-gradient(145deg, #f2d8c8, #e8c4b0); }

  /* Seal */
  .seal {
    width: 52px; height: 52px; border-radius: 50%;
    border: 1.4px solid rgba(255,255,255,0.38);
    display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 1px 3px rgba(255,255,255,0.12),
                0 1px 2px rgba(0,0,0,0.06);
    flex-shrink: 0;
  }
  .seal span {
    font-size: 28px; font-weight: 400; color: rgba(255,255,255,0.82);
    text-shadow: 0 -1px 0 rgba(255,255,255,0.3),
                 0 2px 3px rgba(0,0,0,0.08),
                 0 1px 6px rgba(0,0,0,0.05);
    line-height: 1;
  }

  /* ======== A: 封面式 ======== */
  .cover-a {
    border-radius: 2px 8px 8px 2px; overflow: hidden;
    box-shadow: 0 4px 16px rgba(61,74,61,0.1);
    position: relative;
  }
  .cover-a-top {
    aspect-ratio: 3/2;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 16px;
    position: relative;
  }
  .cover-a-top::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 50%, rgba(0,0,0,0.08) 100%);
    pointer-events: none;
  }
  .cover-a-bottom {
    background: linear-gradient(180deg, #fdfaf4, #f7f1e6);
    padding: 10px 14px 12px 14px;
  }
  .cover-a-title {
    font-size: 13px; font-weight: 500; color: #3d4a3d;
    text-align: center;
  }

  /* ======== B: 拍立得卡片式 ======== */
  .card-b {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 3px 14px rgba(61,74,61,0.08);
    overflow: hidden;
  }
  .card-b-photo {
    margin: 14px 14px 0 14px;
    aspect-ratio: 3/2;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .card-b-photo::after {
    content: ''; position: absolute; inset: 0; border-radius: 4px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.15);
    pointer-events: none;
  }
  .card-b-body {
    padding: 12px 16px 16px;
    display: flex; flex-direction: column; gap: 3px;
  }
  .card-b-title {
    font-size: 14px; font-weight: 600; color: #3d4a3d;
    text-align: center;
  }
  .card-b-line {
    height: 1px; background: rgba(107,155,107,0.06); margin: 2px 0;
  }

  /* ======== C: 笺纸式 ======== */
  .card-c {
    background: linear-gradient(180deg, #fefcf7, #f7f2e6);
    border-radius: 2px 8px 8px 2px;
    box-shadow: 0 2px 10px rgba(61,74,61,0.06),
                0 0 0 1px rgba(139,120,90,0.06);
    padding: 24px 20px 20px;
    position: relative;
  }
  .card-c-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 16px;
  }
  .card-c-ornament {
    display: flex; align-items: center; gap: 8px;
    margin: 8px 0 12px;
  }
  .card-c-line {
    height: 1px; background: rgba(139,120,90,0.12);
    margin: 4px 0;
  }
  .card-c-title {
    font-size: 15px; font-weight: 400; color: #3d4a3d;
    letter-spacing: 2px;
  }

  /* Page stack effect for A & C */
  .stack {
    position: absolute;
    border-radius: 2px;
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- ============ A: 封面式 ============ -->
<div class="column">
  <h3>A · 封面式 Book Cover</h3>

  <div class="card cover-a" style="position:relative">
    <div class="stack" style="inset:4px 2px -4px 2px;background:#e0dbcf;transform:rotate(0.6deg)"></div>
    <div class="cover-a-top c-mint">
      <div class="seal" style="margin-bottom:12px"><span>书</span></div>
      <div style="font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:2px;position:relative;z-index:1">星月之诗</div>
    </div>
    <div class="cover-a-bottom">
      <div class="cover-a-title">星月之诗</div>
    </div>
  </div>

  <div class="card cover-a" style="position:relative">
    <div class="stack" style="inset:4px 2px -4px 2px;background:#e0dbcf;transform:rotate(0.6deg)"></div>
    <div class="cover-a-top c-pink">
      <div class="seal" style="margin-bottom:12px"><span>花</span></div>
      <div style="font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:2px;position:relative;z-index:1">花开有时</div>
    </div>
    <div class="cover-a-bottom">
      <div class="cover-a-title">花开有时</div>
    </div>
  </div>

  <div class="card cover-a" style="position:relative">
    <div class="stack" style="inset:4px 2px -4px 2px;background:#e0dbcf;transform:rotate(0.6deg)"></div>
    <div class="cover-a-top c-lavender">
      <div class="seal" style="margin-bottom:12px"><span>梦</span></div>
      <div style="font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:2px;position:relative;z-index:1">梦境碎片</div>
    </div>
    <div class="cover-a-bottom">
      <div class="cover-a-title">梦境碎片</div>
    </div>
  </div>
</div>

<!-- ============ B: 拍立得卡片式 ============ -->
<div class="column">
  <h3>B · 卡片式 Photo Card</h3>

  <div class="card card-b">
    <div class="card-b-photo c-blue">
      <div class="seal"><span>风</span></div>
    </div>
    <div class="card-b-body">
      <div class="card-b-title">风起陇西</div>
      <div class="card-b-line"></div>
      <div class="card-b-line"></div>
    </div>
  </div>

  <div class="card card-b">
    <div class="card-b-photo c-peach">
      <div class="seal"><span>夜</span></div>
    </div>
    <div class="card-b-body">
      <div class="card-b-title">夜色温柔</div>
      <div class="card-b-line"></div>
      <div class="card-b-line"></div>
    </div>
  </div>

  <div class="card card-b">
    <div class="card-b-photo c-pink">
      <div class="seal"><span>春</span></div>
    </div>
    <div class="card-b-body">
      <div class="card-b-title">春日迟迟</div>
      <div class="card-b-line"></div>
      <div class="card-b-line"></div>
    </div>
  </div>
</div>

<!-- ============ C: 笺纸式 ============ -->
<div class="column">
  <h3>C · 笺纸式 Letter Paper</h3>

  <div class="card" style="position:relative">
    <div class="stack" style="inset:3px 2px -3px 2px;background:#e8e2d5;transform:rotate(0.4deg)"></div>
    <div class="stack" style="inset:1px 1px -1px 1px;background:#efe9dd;transform:rotate(-0.3deg)"></div>
    <div class="card-c">
      <div class="card-c-header">
        <div class="seal"><span>光</span></div>
        <div class="card-c-title">光年之外</div>
      </div>
      <div class="card-c-ornament">
        <div style="width:24px;height:1px;background:rgba(139,120,90,0.18)"></div>
        <div style="width:4px;height:4px;border-radius:50%;background:rgba(139,120,90,0.15)"></div>
        <div style="flex:1;height:1px;background:rgba(139,120,90,0.1)"></div>
      </div>
      <div class="card-c-line"></div>
      <div class="card-c-line"></div>
      <div class="card-c-line"></div>
      <div style="font-size:11px;color:rgba(139,120,90,0.4);margin-top:8px;letter-spacing:1px">第一卷</div>
    </div>
  </div>

  <div class="card" style="position:relative">
    <div class="stack" style="inset:3px 2px -3px 2px;background:#e8e2d5;transform:rotate(0.4deg)"></div>
    <div class="stack" style="inset:1px 1px -1px 1px;background:#efe9dd;transform:rotate(-0.3deg)"></div>
    <div class="card-c">
      <div class="card-c-header">
        <div class="seal"><span>山</span></div>
        <div class="card-c-title">山海经年</div>
      </div>
      <div class="card-c-ornament">
        <div style="width:24px;height:1px;background:rgba(139,120,90,0.18)"></div>
        <div style="width:4px;height:4px;border-radius:50%;background:rgba(139,120,90,0.15)"></div>
        <div style="flex:1;height:1px;background:rgba(139,120,90,0.1)"></div>
      </div>
      <div class="card-c-line"></div>
      <div class="card-c-line"></div>
      <div class="card-c-line"></div>
      <div style="font-size:11px;color:rgba(139,120,90,0.4);margin-top:8px;letter-spacing:1px">第一卷</div>
    </div>
  </div>

  <div class="card" style="position:relative">
    <div class="stack" style="inset:3px 2px -3px 2px;background:#e8e2d5;transform:rotate(0.4deg)"></div>
    <div class="stack" style="inset:1px 1px -1px 1px;background:#efe9dd;transform:rotate(-0.3deg)"></div>
    <div class="card-c">
      <div class="card-c-header">
        <div class="seal"><span>云</span></div>
        <div class="card-c-title">云中故里</div>
      </div>
      <div class="card-c-ornament">
        <div style="width:24px;height:1px;background:rgba(139,120,90,0.18)"></div>
        <div style="width:4px;height:4px;border-radius:50%;background:rgba(139,120,90,0.15)"></div>
        <div style="flex:1;height:1px;background:rgba(139,120,90,0.1)"></div>
      </div>
      <div class="card-c-line"></div>
      <div class="card-c-line"></div>
      <div class="card-c-line"></div>
      <div style="font-size:11px;color:rgba(139,120,90,0.4);margin-top:8px;letter-spacing:1px">第一卷</div>
    </div>
  </div>
</div>

</body>
</html>
