<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>封面调色板 Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #eee; padding: 32px; }
  h1 { text-align: center; margin-bottom: 8px; font-size: 24px; letter-spacing: 2px; }
  .sub { text-align: center; color: #888; margin-bottom: 40px; font-size: 13px; }
  .section { margin-bottom: 48px; }
  .section h2 { font-size: 18px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .section .tag { font-size: 11px; color: #aaa; font-weight: 400; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
  .card { border-radius: 8px 10px 10px 8px; aspect-ratio: 3/4; position: relative; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
  .card .spine { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: rgba(0,0,0,.12); z-index: 1; }
  .card .info { position: absolute; bottom: 0; left: 0; right: 0; padding: 6px 8px; background: rgba(0,0,0,.55); font-size: 10px; line-height: 1.4; }
  .card .info .idx { color: #aaa; }
  .card .info .hex { color: #ddd; }
</style>
</head>
<body>

<h1>书织 StoryLoom — 封面调色板</h1>
<div class="sub">通用封面色 · 糖霜圆舞 · 氧雾珍珠 · 鎏金剧场 · 跳格童年</div>

<div class="section">
  <h2>通用封面色 <span class="tag">bamboo / sakura / ocean / amber / lavender · 20 色</span></h2>
  <div class="grid" id="shared"></div>
</div>

<div class="section">
  <h2>糖霜圆舞 <span class="tag">macaron · 20 色</span></h2>
  <div class="grid" id="macaron"></div>
</div>

<div class="section">
  <h2>氧雾珍珠 <span class="tag">oxygen-pearl · 20 色</span></h2>
  <div class="grid" id="oxygen"></div>
</div>

<div class="section">
  <h2>鎏金剧场 <span class="tag">baroque · 20 色</span></h2>
  <div class="grid" id="baroque"></div>
</div>

<div class="section">
  <h2>跳格童年 <span class="tag">retro-playful · 20 色</span></h2>
  <div class="grid" id="retro"></div>

  ],

function extractColors(gradient) {
  const m = gradient.match(/#[0-9a-fA-F]{6}/g);
  return m || [];
}

function render(id, list) {
  const el = document.getElementById(id);
  list.forEach((grad, i) => {
    const colors = extractColors(grad);
    const label = colors.length === 2 ? `${colors[0]} → ${colors[1]}` : colors[0] || '';
    const c = document.createElement('div');
    c.className = 'card';
    c.style.background = grad;
    c.innerHTML = `<div class="spine"></div><div class="info"><span class="idx">#${i+1}</span> <span class="hex">${label}</span></div>`;
    el.appendChild(c);
  });
}

render('shared', palettes.shared);
render('macaron', palettes.macaron);
render('oxygen', palettes.oxygen);
render('baroque', palettes.baroque);
render('retro', palettes.retro);
